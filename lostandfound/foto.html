<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Foto — Lost & Found BXRink</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{background:white;border-radius:16px;padding:24px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #e2e8f0}
    .logo{font-size:28px}
    .title{font-size:18px;font-weight:700;color:#0f172a}
    .subtitle{font-size:12px;color:#94a3b8;margin-top:2px}
    .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;margin-bottom:12px}
    .badge-item{background:#dcfce7;color:#15803d}
    .badge-claim{background:#dbeafe;color:#1e40af}
    .info{background:#f8fafc;border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;color:#374151;line-height:1.8}
    .info strong{color:#0f172a}
    .photo-wrap{text-align:center;background:#f1f5f9;border-radius:12px;padding:12px;margin-bottom:16px}
    .photo-wrap img{max-width:100%;max-height:400px;border-radius:8px;object-fit:contain}
    .photo-label{font-size:11px;color:#94a3b8;margin-top:8px}
    .loading{text-align:center;color:#64748b;padding:40px 0}
    .error{text-align:center;color:#dc2626;padding:40px 0}
    .footer{text-align:center;font-size:11px;color:#cbd5e1;margin-top:12px}
    .no-photo{text-align:center;color:#94a3b8;padding:32px;font-size:13px}
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">🔍</div>
    <div>
      <div class="title">Lost & Found BXRink</div>
      <div class="subtitle">Foto Dokumentasi</div>
    </div>
  </div>
  <div id="content"><div class="loading">⏳ Memuat foto...</div></div>
  <div class="footer">BXRink Ice Skating · stirring-yeot-a170188.netlify.app</div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCKxKDOWEtTx9lx0WNOSJJRBX1l3YxkAIs",
  authDomain:        "lostandfound-ac502.firebaseapp.com",
  projectId:         "lostandfound-ac502",
  storageBucket:     "lostandfound-ac502.firebasestorage.app",
  messagingSenderId: "138580852129",
  appId:             "1:138580852129:web:b1eee4e4e875c395a31fe0"
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const id     = params.get('id');
const type   = params.get('type') || 'item'; // 'item' atau 'claim'

function fmt(ts) {
  if (!ts) return '-';
  return new Date(ts).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

function fmtDate(s) {
  if (!s) return '-';
  return new Date(s+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
}

async function load() {
  const el = document.getElementById('content');
  if (!id) { el.innerHTML='<div class="error">❌ ID tidak ditemukan di URL</div>'; return; }

  try {
    if (type === 'item') {
      const doc = await db.collection('items').doc(id).get();
      if (!doc.exists) { el.innerHTML='<div class="error">❌ Data barang tidak ditemukan</div>'; return; }
      const item = doc.data();
      const typeLabel = item.type==='lost' ? '🚨 Barang Hilang' : '✅ Barang Ditemukan';
      const badgeCls  = item.type==='lost' ? 'badge-claim' : 'badge-item';

      el.innerHTML = `
        <span class="badge ${badgeCls}">${typeLabel}</span>
        <div class="info">
          <strong>Nama Barang:</strong> ${item.name||'-'}<br>
          <strong>Kategori:</strong> ${item.category||'-'}<br>
          <strong>Lokasi:</strong> ${item.location||'-'}<br>
          <strong>Tanggal:</strong> ${fmtDate(item.date)}<br>
          <strong>Pelapor:</strong> ${item.reporter||'-'}<br>
          <strong>Status:</strong> ${item.status==='open'?'Aktif':item.status==='resolved'?'Selesai':'Lainnya'}
        </div>
        ${item.photo
          ? `<div class="photo-wrap">
               <img src="${item.photo}" alt="Foto Barang"/>
               <div class="photo-label">📷 Foto Barang</div>
             </div>`
          : '<div class="no-photo">📷 Tidak ada foto untuk barang ini</div>'}`;

    } else if (type === 'claim') {
      const doc = await db.collection('claims').doc(id).get();
      if (!doc.exists) { el.innerHTML='<div class="error">❌ Data klaim tidak ditemukan</div>'; return; }
      const c = doc.data();

      // Ambil nama barang
      let itemName = '-';
      try {
        const iDoc = await db.collection('items').doc(c.itemId).get();
        if (iDoc.exists) itemName = iDoc.data().name;
      } catch(e){}

      el.innerHTML = `
        <span class="badge badge-claim">🤝 Bukti Klaim Pengambilan</span>
        <div class="info">
          <strong>Barang:</strong> ${itemName}<br>
          <strong>Nama Pengklaim:</strong> ${c.claimantName||'-'}<br>
          <strong>Kontak:</strong> ${c.claimantContact||'-'}<br>
          <strong>Petugas:</strong> ${c.claimantOfficer||c.pickupOfficer||'-'}<br>
          <strong>Tanggal Klaim:</strong> ${fmt(c.createdAt)}<br>
          <strong>Status:</strong> Selesai ✅
        </div>
        ${c.claimantPhoto
          ? `<div class="photo-wrap">
               <img src="${c.claimantPhoto}" alt="Foto Pengambil"/>
               <div class="photo-label">📷 Foto Pengambil Barang</div>
             </div>`
          : '<div class="no-photo">📷 Tidak ada foto pengambil</div>'}
        ${c.buktiPhoto
          ? `<div class="photo-wrap">
               <img src="${c.buktiPhoto}" alt="Bukti Serah Terima"/>
               <div class="photo-label">📷 Foto Bukti Serah Terima</div>
             </div>`
          : ''}`;
    }
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="error">❌ Gagal memuat: ${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
